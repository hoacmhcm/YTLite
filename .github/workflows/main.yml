name: Create YouTube Plus app

on:
  workflow_dispatch:
    inputs:
      enable_youpip:
        description: "Integrate YouPiP"
        type: boolean
        required: true
        default: false

      enable_ytuhd:
        description: "Integrate YTUHD"
        type: boolean
        required: true
        default: false

      enable_yq:
        description: "Integrate YouQuality"
        type: boolean
        required: true
        default: false

      enable_ryd:
        description: "Integrate Return YouTube Dislikes"
        type: boolean
        required: true
        default: false

      enable_ytabc:
        description: "Integrate YTABConfig"
        type: boolean
        required: true
        default: false

      enable_demc:
        description: "Integrate DontEatMyContent"
        type: boolean
        required: true
        default: false

      ipa_url:
        description: "Direct https:// download URL to the decrypted YouTube IPA file"
        default: ""
        required: true
        type: string

      tweak_version:
        description: "The version of the tweak to use. Enter the version manually from dayanch96/YTLite/releases or leave default"
        default: "5.2b4"
        required: true
        type: string

      display_name:
        description: "App Name (Optional)"
        default: "YouTube"
        required: true
        type: string

      bundle_id:
        description: "BundleID (Optional)"
        default: "com.google.ios.youtube"
        required: true
        type: string

      info_note:
        description: "TIP: Learn more about integrations in the README via the link below"
        default: "https://github.com/dayanch96/YTLite#tweak-integration-details"
        type: string
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-inputs:
    name: Validate Inputs
    runs-on: ubuntu-latest

    steps:
      - name: Validate IPA URL
        env:
          IPA_URL: ${{ inputs.ipa_url }}
        run: |
          if [[ ! "$IPA_URL" =~ ^https?:// ]]; then
            echo "::error::ipa_url must be a direct http(s) download URL to a decrypted YouTube .ipa file. Do not enter the tweak version here."
            exit 1
          fi

  build-tweaks:
    needs: validate-inputs
    uses: ./.github/workflows/_build_tweaks.yml
    with:
      enable_youpip: ${{ inputs.enable_youpip }}
      enable_ytuhd: ${{ inputs.enable_ytuhd }}
      enable_yq: ${{ inputs.enable_yq }}
      enable_ryd: ${{ inputs.enable_ryd }}
      enable_ytabc: ${{ inputs.enable_ytabc }}
      enable_demc: ${{ inputs.enable_demc }}
      tweak_version: ${{ inputs.tweak_version }}

  package:
    name: Package IPA
    runs-on: macos-latest
    needs: [validate-inputs, build-tweaks]
    permissions:
      contents: write

    steps:
      - name: Download built debs
        uses: actions/download-artifact@v8
        with:
          name: built-debs
          path: ${{ github.workspace }}

      - name: Hide sensitive inputs
        uses: levibostian/action-hide-sensitive-inputs@v1
        with:
          exclude_inputs: bundle_id,display_name,enable_demc,enable_ryd,enable_ytabc,enable_youpip,enable_yq,enable_ytuhd,info_note,tweak_version

      - name: Download and validate IPA
        env:
          IPA_URL: ${{ github.event.inputs.ipa_url }}
        run: |
          wget "$IPA_URL" --no-verbose -O youtube.ipa
          file_type=$(file --mime-type -b youtube.ipa)
          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "::error::Validation failed: The downloaded file is not a valid IPA. Detected type: $file_type."
            exit 1
          fi

      - name: Install cyan
        run: pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      - name: Inject tweaks into IPA
        run: |
          if [ ! -f ytplus.deb ]; then
            echo "::error::Missing ytplus.deb from build-tweaks artifact. Refusing to create an IPA without YouTube Plus."
            exit 1
          fi

          output="YouTubePlus_${{ github.event.inputs.tweak_version }}.ipa"
          tweaks=(ytplus.deb)
          for f in *.deb; do
            [ -f "$f" ] || continue
            [ "$f" = "ytplus.deb" ] && continue
            tweaks+=("$f")
          done
          [ -d OpenYoutubeSafariExtension.appex ] && tweaks+=(OpenYoutubeSafariExtension.appex)

          printf 'Injecting files:\n'
          printf '  %s\n' "${tweaks[@]}"
          cyan -i youtube.ipa -o "$output" -uwef "${tweaks[@]}" -n "${{ github.event.inputs.display_name }}" -b ${{ github.event.inputs.bundle_id }}

      - name: Validate injected IPA
        run: |
          output="YouTubePlus_${{ github.event.inputs.tweak_version }}.ipa"
          required_paths=(
            'Payload/YouTube.app/Frameworks/YTLite.dylib'
            'Payload/YouTube.app/Frameworks/CydiaSubstrate.framework/CydiaSubstrate'
            'Payload/YouTube.app/YTLite.bundle/Info.plist'
          )
          for required_path in "${required_paths[@]}"; do
            unzip -l "$output" | grep -q "$required_path" || {
              echo "::error::Injected IPA is missing $required_path."
              exit 1
            }
          done

          tmpdir="$(mktemp -d)"
          unzip -q "$output" 'Payload/YouTube.app/YouTube' -d "$tmpdir"
          otool -L "$tmpdir/Payload/YouTube.app/YouTube" | grep -q '@rpath/YTLite.dylib' || {
            echo "::error::YouTube executable does not load @rpath/YTLite.dylib."
            exit 1
          }

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ytp-${{ github.run_number }}
          name: YouTubePlus v${{ github.event.inputs.tweak_version }} (${{ github.run_number }})
          files: YouTubePlus_${{ github.event.inputs.tweak_version }}.ipa
          draft: true

      - name: Output Release URL
        run: |
          echo "::notice::Release available at: https://github.com/${{ github.repository }}/releases"
